interface:
  display_name: "PD CI Flaky Triage"
  short_description: "Triage recent PD CI flaky failures"
  default_prompt: "Use $pd-ci-flaky-triage to check GitHub auth, collect recent Prow and GitHub Actions failures with `scripts/prepare_logs.py`, delegate raw-log analysis to one subagent per source, merge the source-specific results into `/tmp/failure_items.json` and `/tmp/env_filtered.json`, identify flaky tests from `/tmp/failure_items.json` while excluding PR-local repeats, search existing `type/ci` issues before writing GitHub updates, and create, reopen, or comment by using stored `excerpt_lines` only when the test or package match is exact enough to defend."
