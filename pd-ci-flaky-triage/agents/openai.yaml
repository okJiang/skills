interface:
  display_name: "PD CI Flaky Triage"
  short_description: "Triage recent PD CI flaky failures"
  default_prompt: "Use $pd-ci-flaky-triage to check GitHub auth, collect recent Prow and GitHub Actions failures with `scripts/prepare_logs.py`, delegate raw-log analysis to one subagent per source, write `/tmp/failure_items.json` and `/tmp/env_filtered.json`, identify repeated flaky tests from `/tmp/failure_items.json`, and create or update one GitHub issue per flaky test using stored `excerpt_lines`."
