interface:
  display_name: "PD CI Flaky Triage"
  short_description: "Triage recent PD CI flaky failures"
  default_prompt: "Use $pd-ci-flaky-triage to run the staged PD flaky workflow: keep Prow and GitHub Actions separate through source-specific artifacts, delegate raw-log failure-item extraction to subagent work that reads each local `log_ref` file and produces `/tmp/prow_failure_items.json` and `/tmp/actions_failure_items.json`, have that same step choose the stored GitHub-facing excerpt for each failure item, perform env review before issue matching, review every action candidate before any GitHub write, format `Which jobs are failing` from stored excerpt data instead of re-reading logs by default, run validator fail-closed, never use debug-only summaries as snippet content, and keep `unknown[]` and `env_filtered[]` out of GitHub issue writes."
